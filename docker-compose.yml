services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app/apps/web
    command: ["/bin/sh", "-c", "bun install --backend=copy && bun run dev -- --host 0.0.0.0 --port 3000"]
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - .:/app
      - bun-cache:/root/.bun
      - web-node-modules:/app/apps/web/node_modules

volumes:
  bun-cache:
  web-node-modules:
